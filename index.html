<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <head>
  <meta name="google-site-verification" content="kwebformfilling" />
  </head>
  <title>Glass UI Night Form</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .menu-btn {
      position: absolute; top: 20px; left: 20px;
      font-size: 22px; background: rgba(255,255,255,0.1);
      border: none; color: white; padding: 10px 14px;
      border-radius: 10px; cursor: pointer; backdrop-filter: blur(10px);
    }

    .sidebar {
      position: fixed; left: -250px; top: 0;
      width: 250px; height: 100%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      box-shadow: 5px 0 20px rgba(0,0,0,0.5);
      padding-top: 60px; transition: 0.3s;
    }

    .sidebar a {
      display: block; padding: 15px 25px; color: #fff;
      text-decoration: none; transition: 0.3s;
    }

    .sidebar a:hover { background: rgba(0,255,224,0.2); }

    .sidebar a:first-child {
      font-weight: bold;
      color: #ff6b6b;
    }
    .sidebar.active { left: 0; }

    .glass-card {
      width: 350px; padding: 30px; border-radius: 20px;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      text-align: center; color: #fff;
    }

    .glass-card h2 { margin-bottom: 20px; color: #00ffe0; }

    .glass-card input {
      width: 100%; padding: 12px; margin: 10px 0;
      border: none; border-radius: 10px; outline: none;
      background: rgba(255,255,255,0.1); color: #fff;
    }

    .glass-card button {
      width: 100%; padding: 12px; margin-top: 15px;
      border: none; border-radius: 10px;
      background: #00ffe0; color: #000;
      font-weight: bold; cursor: pointer; transition: 0.3s;
    }

    .glass-card button:hover { background: #00c9a7; }
    #message { margin-top: 15px; font-size: 14px; }
  </style>
</head>
<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
  <a href="#" onclick="toggleMenu()">✖ </a>
  <a href="#" onclick="openPage('home')">Home</a>
  <a href="#" onclick="openPage('profile')">Profile</a>
  <a href="#" onclick="openPage('settings')">Settings</a>
</div>

<div class="glass-card" id="mainContent">
  <h2>Register / Login</h2>

  <form id="form">
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
    <button type="button" onclick="login()">Login</button>
  </form>

  <p id="message"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const supabaseUrl = "https://oaxfetshttoqkyawshym.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9heGZldHNodHRvcWt5YXdzaHltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTIxODIsImV4cCI6MjA5MTIyODE4Mn0.o0_Cr_5BZeD0KsEFH9EENskcnUty9zHRu8NeLUgl6PI";

  window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const form = document.getElementById("form");
  const message = document.getElementById("message");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (password.length < 6) return showMessage("Password must be at least 6 characters", "red");

    showMessage("Signing up...", "yellow");

    const { error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (error) showMessage(error.message, "red");
    else showMessage("Check your email for verification 🚀", "#00ffcc");
  });

  window.login = async function () {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    showMessage("Logging in...", "yellow");

    const { error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) showMessage(error.message, "red");
    else {
      showMessage("Login successful ✅", "#00ffcc");
      openPage('home');
    }
  }

  function showMessage(text, color) {
    message.textContent = text;
    message.style.color = color;
  }
});

function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
}

function openPage(page) {
  const content = document.getElementById("mainContent");

  if (page === "home") {
    content.innerHTML = "<h2>Home</h2><p>Logged in successfully 🎉</p>";
  }

  if (page === "profile") {
    content.innerHTML = "<h2>Profile</h2><p>Fetch user data here</p>";
  }

  if (page === "settings") {
    content.innerHTML = "<h2>Settings</h2><p>Update preferences here</p>";
  }
}
</script>

</body>
</html>
