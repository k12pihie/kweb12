<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 🔑 Supabase Config
  const supabaseUrl = "https://oaxfetshttoqkyawshym.supabase.co";
  const supabaseKey = "sb_publishable_dym0yx0TeDIbeFMnBnO5qQ_Q5quxUNx";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const form = document.getElementById('form');
  const message = document.getElementById('message');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    // ✅ Validation
    if (name.length < 3) {
      showMessage("Name must be at least 3 characters", "#ff6b6b");
      return;
    }

    if (!email.includes("@")) {
      showMessage("Enter a valid email", "#ff6b6b");
      return;
    }

    if (password.length < 6) {
      showMessage("Password must be at least 6 characters", "#ff6b6b");
      return;
    }

    // 🔄 Loading state
    showMessage("Saving...", "#ffd166");

    try {
      const { error } = await supabase
        .from('users')
        .insert([{ name, email, password }]);

      if (error) {
        showMessage("Error: " + error.message, "#ff6b6b");
      } else {
        showMessage("✅ Data saved successfully!", "#00ffcc");
        form.reset();
      }
    } catch (err) {
      showMessage("Unexpected error occurred", "#ff6b6b");
    }
  });

  function showMessage(text, color) {
    message.textContent = text;
    message.style.color = color;
  }
      </script>
